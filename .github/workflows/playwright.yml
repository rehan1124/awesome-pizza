name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  # pull_request:
  #   branches: [ main, master ]
jobs:
  # Fast static gate: lint, format, and types. Runs before the browser matrix so
  # style/type errors fail in seconds instead of after a full sharded test run.
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install Playwright project dependencies
      run: npm ci
      working-directory: playwright
    - name: Lint (ESLint)
      run: npm run lint
      working-directory: playwright
    - name: Check formatting (Prettier)
      run: npm run format:check
      working-directory: playwright
    - name: Typecheck (tsc)
      run: npm run typecheck
      working-directory: playwright

  test:
    needs: quality
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    # Root deps: the webServer starts `tsx ./api/server.ts` from the repo root (cwd: '..').
    - name: Install app (API server) dependencies
      run: npm ci
    # Playwright lives in the ./playwright subfolder with its own package.json.
    - name: Install Playwright project dependencies
      run: npm ci
      working-directory: playwright
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: playwright
    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      working-directory: playwright
    - name: Upload blob report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: blob-report-${{ matrix.shardIndex }}
        path: playwright/blob-report
        retention-days: 1

  merge-reports:
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    # merge-reports only needs Playwright itself (no server), so install just the playwright project.
    - name: Install Playwright project dependencies
      run: npm ci
      working-directory: playwright
    - name: Download blob reports
      uses: actions/download-artifact@v4
      with:
        path: playwright/all-blob-reports
        pattern: blob-report-*
        merge-multiple: true
    - name: Merge into single HTML report + GitHub summary
      run: npx playwright merge-reports --config merge.config.ts ./all-blob-reports
      working-directory: playwright
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright/playwright-report
        retention-days: 30
